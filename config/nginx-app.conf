# ============================================================================
# nginx-app.conf — Web UI under /app, brand landing at / (our hosted deploy).
# PAIR with config/nginx-root.conf (Web UI at /, no landing — self-host).
# Dockerfile copies ONE of these to default.conf based on the APP_BASE_PATH
# build-arg. Keep the two files in sync when editing shared blocks.
# ============================================================================
# Per-artifact subdomain server for local development.
# Handles {uuid}.static.localhost so origin isolation works locally over HTTP.
# In production this is handled by Traefik routing to *.${STATIC_ARTIFACTS_DOMAIN}
# (see config/docker-compose.*.yml). The bare static.localhost host serves no
# artifact content — each artifact is reachable ONLY on its own subdomain.
server {
    listen 80;
    # Matches the bare static host and any {uuid}.static.localhost subdomain.
    # (The bare host resolves no uuid from the Host → backend returns 404.)
    server_name static.localhost ~^.+\.static\.localhost$;

    # All requests to a static (sub)domain map onto the backend /static route.
    # The backend resolves the artifact uuid from the Host header (subdomain) and
    # serves the wrapper at "/", the frame at "/__frame/...", report at
    # "/__report/...". There is no path-based serving.
    location / {
        rewrite ^/(.*)$ /static/$1 break;

        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Sec-Fetch-Dest $http_sec_fetch_dest;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}

# Main application server
server {
    listen 80 default_server;
    server_name localhost _;

    # Disable absolute redirects to preserve port in development
    absolute_redirect off;

    # Centralized access logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    root /var/www/html;
    index index.html;
    
    # Proxy MCP requests to MCP server
    location /mcp {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # MCP-specific headers
        proxy_set_header Accept "application/json, text/event-stream";
        proxy_set_header Content-Type "application/json";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Proxy health check to MCP server
    location /health {
        proxy_pass http://localhost:3000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Proxy OAuth discovery endpoints to backend
    location /.well-known/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy OAuth endpoints to backend (Better Auth MCP OAuth)
    location /oauth/ {
        proxy_pass http://localhost:3001/oauth/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://localhost:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Proxy static artifact serving to backend
    # Public HTML artifacts with branding injection
    # In production, served from ${STATIC_ARTIFACTS_DOMAIN} via Traefik
    location /static/ {
        proxy_pass http://localhost:3001/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Web application - everything under /app
    location /app {
        root /var/www/html;
        try_files $uri /app/index.html;

        # Disable caching for HTML to ensure fresh content after deployments
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Favicon files - served from /var/www/html/favicon/ with long cache
    location = /favicon.ico {
        alias /var/www/html/favicon/favicon.ico;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /favicon-32.png {
        alias /var/www/html/favicon/favicon-32.png;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /apple-touch-icon.png {
        alias /var/www/html/favicon/apple-touch-icon.png;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /android-chrome-192.png {
        alias /var/www/html/favicon/android-chrome-192.png;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /android-chrome-512.png {
        alias /var/www/html/favicon/android-chrome-512.png;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /site.webmanifest {
        alias /var/www/html/favicon/site.webmanifest;
        default_type application/manifest+json;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Static assets - try app first, then landing/docs (docs /_astro bundles)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /var/www/html;
        try_files /app/$uri $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # Documentation site (built Starlight static HTML at /var/www/html/docs and
    # /var/www/html/ru/docs). Serve the static files directly; a missing page
    # 404s (it must NOT fall through to the landing catch-all). The Pagefind
    # search index lives at /pagefind. Starlight asset bundles (/_astro) are
    # handled by the static-asset location above.
    location /docs {
        try_files $uri $uri/ $uri.html =404;
    }

    location /ru/docs {
        try_files $uri $uri/ $uri.html =404;
    }

    location /pagefind/ {
        try_files $uri =404;
    }

    # Serve landing page on root (catch-all, lower priority)
    location / {
        root /var/www/html;
        try_files $uri $uri/ /index.html;

        # Disable caching for HTML to ensure fresh content after deployments
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # CORS headers for API communication
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    }
    
    # Nginx health check endpoint
    location /nginx-health {
        access_log off;
        return 200 "nginx healthy\n";
        add_header Content-Type text/plain;
    }

    # Startup readiness check - proxies to shell script that checks flag file
    location /startup-ready {
        access_log off;
        default_type text/plain;

        # Use try_files to check if flag exists
        # If exists, return 200; otherwise return 503
        if (!-f /tmp/app-ready) {
            return 503 "Application starting...\n";
        }
        return 200 "Application ready\n";
    }
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml;
}