# k6 Load Testing Stack with Grafana and InfluxDB
# Usage: docker compose -f docker-compose.k6.yml up -d
# Grafana: http://localhost:3033 (admin/admin)
# InfluxDB: http://localhost:8087 (external), http://influxdb:8086 (internal)

services:
  influxdb:
    image: influxdb:1.8
    container_name: moira-k6-influxdb
    ports:
      - "8087:8086"
    environment:
      - INFLUXDB_DB=k6
      - INFLUXDB_HTTP_AUTH_ENABLED=false
    volumes:
      - k6-influxdb-data:/var/lib/influxdb
    networks:
      - k6-network
    healthcheck:
      test: ["CMD", "influx", "-execute", "SHOW DATABASES"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.2.3
    container_name: moira-k6-grafana
    ports:
      - "3033:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/k6-load-testing.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - k6-grafana-data:/var/lib/grafana
    networks:
      - k6-network
    depends_on:
      influxdb:
        condition: service_healthy

  # k6 is run as a one-shot container via docker compose run
  # This service definition is for reference and CLI usage
  k6:
    image: grafana/k6:0.48.0
    container_name: moira-k6-runner
    volumes:
      - ./k6:/scripts:ro
    environment:
      - K6_OUT=influxdb=http://influxdb:8086/k6
      - TARGET_ENV=${TARGET_ENV:-local}
      - TARGET_BASE_URL=${TARGET_BASE_URL:-http://host.docker.internal:3032}
      - LOAD_TEST_SECRET=${LOAD_TEST_SECRET:-}
    networks:
      - k6-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - run # Only start when explicitly requested
    depends_on:
      influxdb:
        condition: service_healthy

networks:
  k6-network:
    driver: bridge

volumes:
  k6-influxdb-data:
  k6-grafana-data:
