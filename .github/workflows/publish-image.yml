name: Publish Image

# Builds the public self-host image and pushes it to GHCR.
# This is the OSS publish pipeline — it builds the app image with the Web UI at
# the root (APP_BASE_PATH=/), using a committed, secret-free env file
# (.env.selfhost). It publishes the image only; it does not deploy anywhere.

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Canonical image ref — pinned lowercase (GHCR lowercases the org). Used
  # identically for push (here) and pull (docker-compose.yml). Hardcoded rather
  # than ${{ github.repository_owner }} so the ref is stable regardless of which
  # org/fork builds it.
  IMAGE_NAME: moira-mcp/moira

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: config/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_BASE_PATH=/
            ENV_FILE=.env.selfhost
            BUILD_ID=public
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
